<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Okinawa Memories - Mobile View</title>
    <link rel="stylesheet" href="style.css"> 
    <link rel="stylesheet" href="city.css">
    <link rel="stylesheet" href="mobile-city.css"> </head>
<body class="theme-okinawa">

    <div id="mobile-container">
        <header class="page-header">
            <h1>Okinawa Memories</h1>
            <p>Swipe to see more</p>
        </header>

        <div class="scroll-wrapper" id="scroll-wrapper">
            <div class="image-track" id="image-track">
                </div>
        </div>

        <div style="display: flex; flex-direction: column; align-items: center; padding-bottom: 80px;">
            <div id="caption">Loading...</div>
            <div class="indicator-container" id="dots-container"></div>
        </div>

        <button id="back-map-btn" onclick="location.href='travel-mobile.html'">
            ← Back to Map
        </button>
    </div>

<script>
        const memories = [
            { imgSrc: 'images/Okinawa/americanvillage.jpg', text: 'American Village with a unique atmosphere!' },
            { imgSrc: 'images/Okinawa/blueseal.jpg', text: 'Blue Seal, a hugely popular ice cream brand!' },
            { imgSrc: 'images/Okinawa/clearsky.jpg', text: 'Clear blue sky over clear ocean!' },
            { imgSrc: 'images/Okinawa/highjump.jpg', text: 'Express my joy with a high jump!' },
            { imgSrc: 'images/Okinawa/mazesoba.jpg', text: 'Authentic Shuriken Soba a unique noodle!' },
            { imgSrc: 'images/Okinawa/kokusai-dori.jpg', text: 'Vibrant Kokusai Dori with bustling shops!' },
            { imgSrc: 'images/Okinawa/marinesports.jpg', text: 'Exciting marine sports at the beach!' },
            { imgSrc: 'images/Okinawa/seasideterace.jpg', text: 'refreshing seaside terrace in the heat!' },
            { imgSrc: 'images/Okinawa/stakehouse.jpg', text: 'Juicy stake at the stakehouse!' },
            { imgSrc: 'images/Okinawa/tacosu.jpg', text: 'Delicious Tacosu a local specialty!' }
        ];

const track = document.getElementById('image-track');
const dotsContainer = document.getElementById('dots-container');
const scrollWrapper = document.getElementById('scroll-wrapper');
const caption = document.getElementById('caption');
caption.textContent = memories[0].text;

/* ===== 生成 ===== */
memories.forEach((m, index) => {
  const item = document.createElement('div');
  item.className = 'memory-item';
  item.innerHTML = `
    <img src="${m.imgSrc}">`;
  track.appendChild(item);

  const dot = document.createElement('div');
  dot.className = 'dot' + (index === 0 ? ' active' : '');
  dotsContainer.appendChild(dot);
});

const items = document.querySelectorAll('.memory-item');

scrollWrapper.addEventListener('scroll', () => {
  let closestIndex = 0;
  let closestDistance = Infinity;

  items.forEach((item, i) => {
    const rect = item.getBoundingClientRect();
    const center = window.innerWidth / 2;
    const itemCenter = rect.left + rect.width / 2;
    const distance = Math.abs(center - itemCenter);

    if (distance < closestDistance) {
      closestDistance = distance;
      closestIndex = i;
    }
  });

  document.querySelectorAll('.dot').forEach((dot, i) => {
    dot.classList.toggle('active', i === closestIndex);
  });
  caption.textContent = memories[closestIndex].text;
});
</script>

</body>
</html>
