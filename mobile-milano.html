<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milano Memories - Mobile View</title>
    <link rel="stylesheet" href="style.css"> 
    <link rel="stylesheet" href="city.css">
    <link rel="stylesheet" href="mobile-city.css"> </head>
<body class="theme-italy">

    <div id="mobile-container">
        <header class="page-header">
            <h1>Milano Memories</h1>
            <p>Swipe to see more</p>
        </header>

        <div class="scroll-wrapper" id="scroll-wrapper">
            <div class="image-track" id="image-track">
                </div>
        </div>

        <div style="display: flex; flex-direction: column; align-items: center; padding-bottom: 80px;">
            <div id="caption">Loading...</div>
            <div class="indicator-container" id="dots-container"></div>
        </div>

        <button id="back-map-btn" onclick="location.href='travel-mobile.html'">
            ← Back to Map
        </button>
    </div>

<script>
        const memories = [
            { imgSrc: 'images/Milano/pizza.png', text: 'Prosciutto and Mozzarella Pizza perfection!' },
            { imgSrc: 'images/Milano/belgamo.png', text: 'Bergamo views overlooking the entire city!' },
            { imgSrc: 'images/Milano/desert.png', text: 'Delicious mille-feuille that stole the show!' },
            { imgSrc: 'images/Milano/gondora.png', text: 'Gondola ride through the historic canals!' },
            { imgSrc: 'images/Milano/ham.png', text: 'Salty and flavorful Prosciutto!' },
            { imgSrc: 'images/Milano/music.png', text: 'Discovered the statue of David in the museum!' },
            { imgSrc: 'images/Milano/santamariacharch.png', text: 'Santa Maria della Salute church with its iconic dome!' },
            { imgSrc: 'images/Milano/stake.png', text: 'Unique stake like I\'ve never seen before!' },
            { imgSrc: 'images/Milano/station.png', text: 'Spacious and stunning train station!' },
            { imgSrc: 'images/Milano/yellow.png', text: 'Stylish and sweet dessert treat!' }
        ];

const track = document.getElementById('image-track');
const dotsContainer = document.getElementById('dots-container');
const scrollWrapper = document.getElementById('scroll-wrapper');
const caption = document.getElementById('caption');
caption.textContent = memories[0].text;

/* ===== 生成 ===== */
memories.forEach((m, index) => {
  const item = document.createElement('div');
  item.className = 'memory-item';
  item.innerHTML = `
    <img src="${m.imgSrc}">`;
  track.appendChild(item);

  const dot = document.createElement('div');
  dot.className = 'dot' + (index === 0 ? ' active' : '');
  dotsContainer.appendChild(dot);
});

const items = document.querySelectorAll('.memory-item');

scrollWrapper.addEventListener('scroll', () => {
  let closestIndex = 0;
  let closestDistance = Infinity;

  items.forEach((item, i) => {
    const rect = item.getBoundingClientRect();
    const center = window.innerWidth / 2;
    const itemCenter = rect.left + rect.width / 2;
    const distance = Math.abs(center - itemCenter);

    if (distance < closestDistance) {
      closestDistance = distance;
      closestIndex = i;
    }
  });

  document.querySelectorAll('.dot').forEach((dot, i) => {
    dot.classList.toggle('active', i === closestIndex);
  });
  caption.textContent = memories[closestIndex].text;
});
</script>

</body>
</html>
