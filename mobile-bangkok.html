<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bangkok Memories - Mobile View</title>
    <link rel="stylesheet" href="style.css"> <link rel="stylesheet" href="mobile-city.css"> </head>
<body class="theme-thailand">

    <div id="mobile-container">
        <header class="page-header">
            <h1>Bangkok Memories</h1>
            <p>Swipe to see more</p>
        </header>

        <div class="scroll-wrapper" id="scroll-wrapper">
            <div class="image-track" id="image-track">
                </div>
        </div>

        <div style="display: flex; flex-direction: column; align-items: center; padding-bottom: 80px;">
            <div id="caption">Loading...</div>
            <div class="indicator-container" id="dots-container"></div>
        </div>

        <button id="back-map-btn" onclick="location.href='travel-mobile.html'">
            ← Back to Map
        </button>
    </div>

<script>
    const memories = [
        { imgSrc: 'images/Bangkok/airport.jpg', text: 'Suvarnabhumi Airport with many travelers!' },
        { imgSrc: 'images/Bangkok/friedfish.jpg', text: 'Tasty Fried Fish with a spicy kick!' },
        { imgSrc: 'images/Bangkok/gaitod.jpg', text: 'Delicious Gai Tod chicken with spicy rice!' },
        { imgSrc: 'images/Bangkok/nightmarket.jpg', text: 'Huge night market with lots of market stalls!' },
        { imgSrc: 'images/Bangkok/padthai.jpg', text: 'Authentic Pad Thai incredibly delicious!' },
        { imgSrc: 'images/Bangkok/poolhotel.jpg', text: 'Night pool at the hotel!' },
        { imgSrc: 'images/Bangkok/shoolmarket.jpg', text: 'Weekly school market with local foods!' },
        { imgSrc: 'images/Bangkok/temple.jpg', text: 'Historic temple with stunning architecture!' },
        { imgSrc: 'images/Bangkok/buddha.jpg', text: 'Buddha statue with a serene expression!' },
        { imgSrc: 'images/Bangkok/train.jpg', text: 'Train roaring with a powerful whistle!' }
    ];

    const track = document.getElementById('image-track');
    const dotsContainer = document.getElementById('dots-container');
    const scrollWrapper = document.getElementById('scroll-wrapper');
    const caption = document.getElementById('caption');

    // コンテンツ生成
    memories.forEach((m, index) => {
        const item = document.createElement('div');
        item.className = 'memory-item';
        item.innerHTML = `<img src="${m.imgSrc}">`;
        track.appendChild(item);

        const dot = document.createElement('div');
        dot.className = 'dot' + (index === 0 ? ' active' : '');
        dotsContainer.appendChild(dot);
    });

    caption.textContent = memories[0].text;

    // スクロールイベント
    scrollWrapper.addEventListener('scroll', () => {
        const scrollLeft = scrollWrapper.scrollLeft;
        const itemWidth = 295 + 20; // memory-itemのflex-basis + margin
        const index = Math.round(scrollLeft / itemWidth);

        if (memories[index]) {
            // キャプション更新
            caption.textContent = memories[index].text;
            // ドット更新
            document.querySelectorAll('.dot').forEach((dot, i) => {
                dot.classList.toggle('active', i === index);
            });
        }
    });
</script>
</body>
</html>
