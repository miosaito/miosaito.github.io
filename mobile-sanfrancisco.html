<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>San Francisco Memories - Mobile View</title>
    <link rel="stylesheet" href="style.css"> 
    <link rel="stylesheet" href="city.css">
    <link rel="stylesheet" href="mobile-city.css"> </head>
<body class="theme-usa">

    <div id="mobile-container">
        <header class="page-header">
            <h1>San Francisco Memories</h1>
            <p>Swipe to see more</p>
        </header>

        <div class="scroll-wrapper" id="scroll-wrapper">
            <div class="image-track" id="image-track">
                </div>
        </div>

        <div style="display: flex; flex-direction: column; align-items: center; padding-bottom: 80px;">
            <div id="caption">Loading...</div>
            <div class="indicator-container" id="dots-container"></div>
        </div>

        <button id="back-map-btn" onclick="location.href='travel-mobile.html'">
            ← Back to Map
        </button>
    </div>

<script>
        const memories = [
            { imgSrc: 'images/SanFrancisco/BikearoundStanforduniversity.jpg', text: 'Scenic bike ride around Stanford University!' },
            { imgSrc: 'images/SanFrancisco/castlelikecityhall.jpg', text: 'Stately City Hall with impressive architecture!' },
            { imgSrc: 'images/SanFrancisco/cheesecakefactory.jpg', text: 'Delicious Cheesecake a San Francisco specialty!' },
            { imgSrc: 'images/SanFrancisco/Goldengatebridge.jpg', text: 'Breathtaking Golden Gate Bridge an iconic landmark!' },
            { imgSrc: 'images/SanFrancisco/highschoollocker.jpg', text: 'Bright red lockers at a high school!' },
            { imgSrc: 'images/SanFrancisco/humbergeratlombardstreet.jpg', text: 'Juicy Hamburger at Lombard Street!' },
            { imgSrc: 'images/SanFrancisco/Lombardstreet.jpg', text: 'Very steep and winding Lombard Street!' },
            { imgSrc: 'images/SanFrancisco/sanfranciscobaysaltponds.jpg', text: 'Salt flats of the San Francisco Bay!' },
            { imgSrc: 'images/SanFrancisco/sithtseeingbus.jpg', text: 'Scenic sightseeing bus tour of the city!' },
            { imgSrc: 'images/SanFrancisco/stanforduniversity.png', text: 'Beautiful campus of Stanford University!' }
        ];

const track = document.getElementById('image-track');
const dotsContainer = document.getElementById('dots-container');
const scrollWrapper = document.getElementById('scroll-wrapper');
const caption = document.getElementById('caption');
caption.textContent = memories[0].text;

/* ===== 生成 ===== */
memories.forEach((m, index) => {
  const item = document.createElement('div');
  item.className = 'memory-item';
  item.innerHTML = `
    <img src="${m.imgSrc}">`;
  track.appendChild(item);

  const dot = document.createElement('div');
  dot.className = 'dot' + (index === 0 ? ' active' : '');
  dotsContainer.appendChild(dot);
});

const items = document.querySelectorAll('.memory-item');

scrollWrapper.addEventListener('scroll', () => {
  let closestIndex = 0;
  let closestDistance = Infinity;

  items.forEach((item, i) => {
    const rect = item.getBoundingClientRect();
    const center = window.innerWidth / 2;
    const itemCenter = rect.left + rect.width / 2;
    const distance = Math.abs(center - itemCenter);

    if (distance < closestDistance) {
      closestDistance = distance;
      closestIndex = i;
    }
  });

  document.querySelectorAll('.dot').forEach((dot, i) => {
    dot.classList.toggle('active', i === closestIndex);
  });
  caption.textContent = memories[closestIndex].text;
});
</script>

</body>
</html>
